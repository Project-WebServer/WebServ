<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>502</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f9f9f8;color:#1a1a1a;font-family:'Inter',sans-serif}
body{display:grid;grid-template-rows:auto 1fr auto;min-height:100vh}
.bar{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:52px;background:#fff;border-bottom:1px solid #e8e8e5}
.bar-id{font-family:'JetBrains Mono',monospace;font-size:11px;color:#aaa;letter-spacing:.08em}
.bar-tag{font-size:11px;color:#bbb;letter-spacing:.06em}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#D35400;margin-right:8px}
.main{display:flex;align-items:center;justify-content:center;padding:60px 40px}
.card{max-width:480px;width:100%}
.num{font-family:'JetBrains Mono',monospace;font-size:80px;font-weight:500;line-height:1;color:#D35400;letter-spacing:-0.03em;margin-bottom:4px}
.rule{width:32px;height:2px;background:#D35400;margin:18px 0}
.lbl{font-size:11px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:#999;margin-bottom:14px}
.ttl{font-size:20px;font-weight:400;color:#111;line-height:1.4;margin-bottom:12px}
.dsc{font-size:13px;color:#777;line-height:1.75}
.foot{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;border-top:1px solid #e8e8e5;background:#fff}
.foot span{font-size:11px;color:#ccc;letter-spacing:.06em}
</style>
</head>
<body>
<header class="bar">
  <span class="bar-id">webserv</span>
  <span class="bar-tag"><span class="dot"></span>default error</span>
</header>
<main class="main">
  <div class="card">
    <div class="num">502</div>
    <div class="rule"></div>
    <div class="lbl">502 Bad Gateway</div>
    <h1 class="ttl">An invalid response was received from upstream.</h1>
    <p class="dsc">The server received a malformed or unrecognized response from the upstream CGI process or backend.</p>
  </div>
</main>
<footer class="foot">
  <span>HTTP/1.1</span>
  <span>webserv</span>
</footer>
</body>
</html>
