server {
	listen 127.0.0.1:8080;
	root /data;
	#no server_name. / Fallback server block.
	client_max_body_size 5M; #The same as 5MB
	# Error pages
	error_page 400 /error_pages/400.html;
	error_page 403 /error_pages/403.html;
	error_page 404 /error_pages/404.html;
	error_page 405 /error_pages/405.html;
	error_page 413 /error_pages/413.html;
	error_page 500 /error_pages/500.html;
	error_page 502 /error_pages/502.html;

	#Serving Static Content // redirection return html code 3xx url/uri
	location /test1 {
		return = 301 https://www.youtube.com/watch?v=4rgSzQwe5DQ&list=PLcGkkXtask_e9vGe0O0DCGcr5EC5v3SYc; #301 is the HTTP status code for "Moved Permanently"
	}

	# Root Handler (Homepage)
	location /{
		root /data/html;
		index index.html;
		allowed_methods GET;
		upload_store /data/uploads; #work if relative path
		autoindex on; #Enables directory listing - We can turn this on and off as much as we want. (It shows the files in the directory)
        # return = 301 https://www.youtube.com/watch?v=dQw4w9WgXcQ ; #301 is the HTTP status code for "Moved Permanently"
    }

	# CGI Handler
	location /cgi-bin {
		cgi_pass .py /usr/bin/python3;
		allowed_methods GET POST DELETE;
		autoindex off; # if it is on, it still forbidden access
	}

	location /images {
		root  /data/images;
		index  index.html;
		allowed_methods  GET;
		autoindex off; #Enables directory listing - We can turn this on and off as much as we want. (It shows the files in the directory)
	}

	location /upload {
		root  /data/upload;
		index index.html;
		allowed_methods  GET POST DELETE;
		autoindex off; #Enables directory listing - We can turn this on and off as much as we want. (It shows the files in the directory)
	}

}

