<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webserv — Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #e8c547;
      --orange: #ff6b35;
      --dark: #080808;
      --muted: #555;
      --text: #e8e0d0;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    /* top status bar */
    .status-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 0.9rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3ecf8e;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-right {
      font-size: 0.55rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* center content */
    .center {
      text-align: center;
      max-width: 520px;
    }

    .pre-title {
      font-size: 0.58rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 8vw, 5rem);
      font-weight: 900;
      line-height: 0.95;
      margin-bottom: 1.2rem;
    }

    h1 span { color: var(--gold); }

    .tagline {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 3rem;
    }

    /* nav cards */
    .nav-cards {
      display: flex;
      gap: 1px;
      width: 100%;
    }

    .card {
      flex: 1;
      background: #111;
      padding: 1.4rem 1rem;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      border: 1px solid transparent;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    .card:hover {
      background: #161616;
      border-color: rgba(232,197,71,0.2);
    }

    .card-icon { font-size: 1.4rem; }

    .card-label {
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.2s;
    }

    .card:hover .card-label { color: var(--gold); }

    /* divider */
    .divider {
      width: 40px;
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 2.5rem auto;
    }

    /* footer note */
    .foot {
      font-size: 0.55rem;
      color: #333;
      letter-spacing: 0.12em;
    }

    .foot span { color: var(--gold); opacity: 0.5; }
  </style>
</head>
<body>

  <div class="status-bar">
    <div class="status-dot">
      <div class="dot"></div>
      server running
    </div>
    <div class="status-right">HTTP/1.1 · port 8080</div>
  </div>

  <div class="center">
    <p class="pre-title">École 42 · Webserv</p>
    <h1>Sound<span>wave</span></h1>
    <p class="tagline">A custom C++ web server.<br>Choose a destination below.</p>

    <div class="nav-cards">
      <a href="/music" class="card">
        <span class="card-icon">🎵</span>
        <span class="card-label">Music</span>
      </a>
      <a href="/images" class="card">
        <span class="card-icon">🖼</span>
        <span class="card-label">Images</span>
      </a>
      <a href="/upload" class="card">
        <span class="card-icon">⬆</span>
        <span class="card-label">Upload</span>
      </a>
      <a href="/about" class="card">
        <span class="card-icon">◎</span>
        <span class="card-label">About</span>
      </a>
    </div>

    <div class="divider"></div>
    <p class="foot">served from <span>data/html/index.html</span></p>
  </div>

</body>
</html>
