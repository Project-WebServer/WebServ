<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="vinyl-gradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="30%" stop-color="#0a0a0a"/>
      <stop offset="60%" stop-color="#1c1c1c"/>
      <stop offset="80%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </radialGradient>
    <radialGradient id="label-gradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8c547"/>
      <stop offset="60%" stop-color="#d4a820"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </radialGradient>
    <radialGradient id="shine" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Vinyl disc -->
  <circle cx="200" cy="200" r="190" fill="url(#vinyl-gradient)"/>
  
  <!-- Groove rings -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="#222" stroke-width="0.5" opacity="0.6"/>
  <circle cx="200" cy="200" r="175" fill="none" stroke="#222" stroke-width="0.5" opacity="0.6"/>
  <circle cx="200" cy="200" r="165" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.8"/>
  <circle cx="200" cy="200" r="155" fill="none" stroke="#222" stroke-width="0.5" opacity="0.6"/>
  <circle cx="200" cy="200" r="145" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.8"/>
  <circle cx="200" cy="200" r="135" fill="none" stroke="#222" stroke-width="0.5" opacity="0.6"/>
  <circle cx="200" cy="200" r="125" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.8"/>
  <circle cx="200" cy="200" r="115" fill="none" stroke="#222" stroke-width="0.5" opacity="0.6"/>
  <circle cx="200" cy="200" r="108" fill="none" stroke="#333" stroke-width="1.5" opacity="0.9"/>

  <!-- Label -->
  <circle cx="200" cy="200" r="70" fill="url(#label-gradient)"/>
  
  <!-- Label text -->
  <text x="200" y="185" text-anchor="middle" font-family="serif" font-size="11" font-weight="bold" fill="#5c3a00" letter-spacing="3">SOUNDWAVE</text>
  <text x="200" y="200" text-anchor="middle" font-family="serif" font-size="8" fill="#7a4f00" letter-spacing="2">RECORDS</text>
  <line x1="165" y1="207" x2="235" y2="207" stroke="#7a4f00" stroke-width="0.5" opacity="0.7"/>
  <text x="200" y="218" text-anchor="middle" font-family="serif" font-size="7" fill="#5c3a00">Side A</text>
  
  <!-- Center hole -->
  <circle cx="200" cy="200" r="8" fill="#0a0a0a"/>
  <circle cx="200" cy="200" r="3" fill="#111"/>

  <!-- Shine overlay -->
  <circle cx="200" cy="200" r="190" fill="url(#shine)"/>
</svg>
