<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <linearGradient id="note-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c547"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
  </defs>
  
  <!-- Background transparent -->
  <rect width="600" height="300" fill="transparent"/>

  <!-- Music note 1 (large) -->
  <g transform="translate(80, 30)" opacity="0.9">
    <ellipse cx="30" cy="200" rx="28" ry="20" fill="url(#note-grad)" transform="rotate(-20, 30, 200)"/>
    <rect x="54" y="50" width="8" height="155" fill="url(#note-grad)" rx="4"/>
    <rect x="54" y="50" width="55" height="8" fill="url(#note-grad)" rx="4"/>
    <rect x="101" y="66" width="8" height="50" fill="url(#note-grad)" rx="4"/>
    <ellipse cx="105" cy="120" rx="22" ry="16" fill="url(#note-grad)" transform="rotate(-20, 105, 120)"/>
  </g>

  <!-- Music note 2 (small) -->
  <g transform="translate(270, 60)" opacity="0.7" >
    <ellipse cx="20" cy="130" rx="19" ry="14" fill="#e8c547" transform="rotate(-20, 20, 130)"/>
    <rect x="36" y="30" width="6" height="105" fill="#e8c547" rx="3"/>
    <path d="M 36 30 Q 80 15 80 45" fill="none" stroke="#e8c547" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Double music note -->
  <g transform="translate(380, 20)" opacity="0.85">
    <ellipse cx="22" cy="195" rx="22" ry="16" fill="url(#note-grad)" transform="rotate(-20, 22, 195)"/>
    <ellipse cx="80" cy="175" rx="22" ry="16" fill="url(#note-grad)" transform="rotate(-20, 80, 175)"/>
    <rect x="40" y="45" width="6" height="155" fill="url(#note-grad)" rx="3"/>
    <rect x="98" y="25" width="6" height="155" fill="url(#note-grad)" rx="3"/>
    <rect x="40" y="45" width="64" height="6" fill="url(#note-grad)" rx="3"/>
    <rect x="40" y="60" width="64" height="6" fill="url(#note-grad)" rx="3"/>
  </g>

  <!-- Small star notes scattered -->
  <text x="490" y="80" font-size="40" fill="#e8c547" opacity="0.5">♪</text>
  <text x="540" y="160" font-size="28" fill="#ff6b35" opacity="0.4">♫</text>
  <text x="20" y="270" font-size="32" fill="#e8c547" opacity="0.35">♩</text>
  <text x="320" y="270" font-size="24" fill="#ff6b35" opacity="0.3">♬</text>
</svg>
