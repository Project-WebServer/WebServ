<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0f0a1a"/>
    </linearGradient>
    <linearGradient id="bar-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8c547"/>
      <stop offset="50%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg-grad)"/>

  <!-- Grid lines -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#ffffff" stroke-width="0.3" opacity="0.1"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>

  <!-- Equalizer bars (centered vertically) -->
  <!-- Each bar: x position, height above center, height below center -->
  <rect x="30" y="130" width="18" height="140" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="60" y="80" width="18" height="240" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="90" y="110" width="18" height="180" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="120" y="60" width="18" height="280" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="150" y="100" width="18" height="200" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="180" y="50" width="18" height="300" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="210" y="140" width="18" height="120" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="240" y="90" width="18" height="220" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="270" y="70" width="18" height="260" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="300" y="120" width="18" height="160" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="330" y="40" width="18" height="320" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="360" y="80" width="18" height="240" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="390" y="110" width="18" height="180" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="420" y="55" width="18" height="290" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="450" y="130" width="18" height="140" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="480" y="70" width="18" height="260" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="510" y="100" width="18" height="200" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="540" y="45" width="18" height="310" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="570" y="120" width="18" height="160" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="600" y="85" width="18" height="230" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="630" y="60" width="18" height="280" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="660" y="115" width="18" height="170" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="690" y="90" width="18" height="220" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="720" y="140" width="18" height="120" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
  <rect x="750" y="75" width="18" height="250" rx="3" fill="url(#bar-grad)" opacity="0.9" filter="url(#glow)"/>
</svg>
