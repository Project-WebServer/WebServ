<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="headphone-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="pad-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8c547"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(232,197,71,0.3)"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="185" fill="#0d0d0d"/>
  <circle cx="200" cy="200" r="185" fill="none" stroke="#e8c547" stroke-width="0.5" opacity="0.3"/>

  <!-- Headband arc -->
  <path d="M 100 220 Q 100 80 200 75 Q 300 80 300 220" fill="none" stroke="url(#headphone-grad)" stroke-width="22" stroke-linecap="round" filter="url(#shadow)"/>
  <path d="M 100 220 Q 100 80 200 75 Q 300 80 300 220" fill="none" stroke="#222" stroke-width="18" stroke-linecap="round"/>
  
  <!-- Accent stripe on headband -->
  <path d="M 152 100 Q 170 78 200 75 Q 230 78 248 100" fill="none" stroke="url(#accent-grad)" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- Left ear cup -->
  <ellipse cx="100" cy="235" rx="42" ry="55" fill="url(#pad-grad)" stroke="#333" stroke-width="1" filter="url(#shadow)"/>
  <ellipse cx="100" cy="235" rx="35" ry="45" fill="#1a1a1a"/>
  <ellipse cx="100" cy="235" rx="22" ry="30" fill="#111"/>
  <!-- Left driver circle -->
  <circle cx="100" cy="235" r="18" fill="none" stroke="url(#accent-grad)" stroke-width="2" opacity="0.6"/>
  <circle cx="100" cy="235" r="6" fill="#e8c547" opacity="0.4"/>

  <!-- Right ear cup -->
  <ellipse cx="300" cy="235" rx="42" ry="55" fill="url(#pad-grad)" stroke="#333" stroke-width="1" filter="url(#shadow)"/>
  <ellipse cx="300" cy="235" rx="35" ry="45" fill="#1a1a1a"/>
  <ellipse cx="300" cy="235" rx="22" ry="30" fill="#111"/>
  <!-- Right driver circle -->
  <circle cx="300" cy="235" r="18" fill="none" stroke="url(#accent-grad)" stroke-width="2" opacity="0.6"/>
  <circle cx="300" cy="235" r="6" fill="#e8c547" opacity="0.4"/>

  <!-- Cable left -->
  <path d="M 100 290 Q 100 320 130 340" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Brand mark -->
  <text x="200" y="355" text-anchor="middle" font-family="serif" font-size="10" fill="#e8c547" letter-spacing="6" opacity="0.7">SOUNDWAVE</text>
</svg>
