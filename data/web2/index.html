<!-- ── METHOD TESTER ── -->
<div style="max-width:760px;margin:0 auto;width:100%;padding:2rem 0 0;">
  <div class="section-title">http method tester</div>

  <div style="display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:1rem;" id="method-btns">
    <button class="method mbtn-get active" data-method="GET">GET</button>
    <button class="method mbtn-post" data-method="POST">POST</button>
    <button class="method mbtn-delete" data-method="DELETE">DELETE</button>
    <button class="method mbtn-put" data-method="PUT">PUT</button>
    <button class="method mbtn-patch" data-method="PATCH">PATCH</button>
    <button class="method mbtn-head" data-method="HEAD">HEAD</button>
    <button class="method mbtn-options" data-method="OPTIONS">OPTIONS</button>
    <button class="method mbtn-trace" data-method="TRACE">TRACE</button>
    <button class="method mbtn-custom" data-method="CUSTOM">CUSTOM ✎</button>
  </div>

  <div id="custom-row" style="display:none;margin-bottom:0.8rem;">
    <input id="custom-method" placeholder="FOOBAR"
      style="background:var(--surface);border:1px solid var(--border);color:#fff;
             font-family:var(--mono);font-size:0.8rem;padding:0.3rem 0.7rem;
             border-radius:2px;text-transform:uppercase;outline:none;width:140px;" />
  </div>

  <div style="display:flex;gap:0.5rem;margin-bottom:0.5rem;">
    <input id="tester-path" value="/"
      style="flex:1;background:var(--surface);border:1px solid var(--border);color:#fff;
             font-family:var(--mono);font-size:0.8rem;padding:0.3rem 0.8rem;
             border-radius:2px;outline:none;" />
    <button id="tester-send"
      style="font-family:var(--mono);font-size:0.75rem;letter-spacing:0.1em;
             background:var(--accent);color:#0b0e14;border:none;padding:0.35rem 1rem;
             border-radius:2px;cursor:pointer;font-weight:500;text-transform:uppercase;">
      ▶ SEND
    </button>
  </div>

  <div class="terminal" style="margin-top:0.8rem;">
    <div class="terminal-bar" id="tester-bar">RESPONSE</div>
    <pre id="tester-out"><span style="color:var(--muted)">pressione SEND para disparar</span></pre>
  </div>
</div>

<style>
  .method {
    font-family:var(--mono);font-size:0.65rem;letter-spacing:0.1em;font-weight:500;
    padding:0.25rem 0.6rem;border-radius:2px;cursor:pointer;border:1px solid;
    text-transform:uppercase;
  }
  .mbtn-get    {background:#00e5a022;color:var(--accent);border-color:#00e5a044;}
  .mbtn-post   {background:#0088ff22;color:var(--accent2);border-color:#0088ff44;}
  .mbtn-delete {background:#ff444422;color:#ff6666;border-color:#ff444444;}
  .mbtn-put    {background:#ffcc0022;color:var(--warn);border-color:#ffcc0044;}
  .mbtn-patch  {background:#ff880022;color:#ff9944;border-color:#ff880044;}
  .mbtn-head   {background:#aa44ff22;color:#cc77ff;border-color:#aa44ff44;}
  .mbtn-options{background:#ff44aa22;color:#ff77cc;border-color:#ff44aa44;}
  .mbtn-trace  {background:#44aaff22;color:#77ccff;border-color:#44aaff44;}
  .mbtn-custom {background:#ffffff11;color:#fff;border-color:#ffffff33;}
  .method.active{box-shadow:0 0 0 1px currentColor;}
</style>

<script>
(function(){
  let sel = 'GET';
  document.querySelectorAll('[data-method]').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('[data-method]').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); sel=b.dataset.method;
      document.getElementById('custom-row').style.display=sel==='CUSTOM'?'block':'none';
    });
  });
  document.getElementById('tester-send').addEventListener('click', async()=>{
    let m=sel==='CUSTOM'?document.getElementById('custom-method').value.trim().toUpperCase():sel;
    if(!m)return;
    const path=document.getElementById('tester-path').value||'/';
    const out=document.getElementById('tester-out');
    const bar=document.getElementById('tester-bar');
    out.innerHTML='<span style="color:var(--muted)">aguardando...</span>';
    const t0=Date.now();
    try{
      const r=await fetch(path,{method:m,headers:{'X-Test-Tool':'webserv-tester'}});
      const ms=Date.now()-t0;
      const body=await r.text().catch(()=>'');
      const sc=r.status<300?'var(--accent)':r.status<500?'var(--warn)':'#ff6666';
      bar.textContent=m+' '+path+' → '+r.status+' ('+ms+'ms)';
      out.innerHTML=`<span style="color:${sc}">${r.status} ${r.statusText}</span>  <span style="color:var(--muted)">${ms}ms</span>\n\n`
        +`<span style="color:var(--muted)">body (${body.length}b):\n${body.slice(0,400).replace(/</g,'&lt;')}</span>`;
    }catch(e){
      bar.textContent=m+' '+path+' → ERRO';
      out.innerHTML=`<span style="color:#ff6666">${e.message}</span>`;
    }
  });
})();
</script>
