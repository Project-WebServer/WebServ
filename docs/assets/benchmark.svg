  <text x="259" y="86" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:var(--color-text-success);fill:rgb(122, 185, 72);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:central">availability</text>
